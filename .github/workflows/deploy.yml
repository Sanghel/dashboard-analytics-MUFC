name: Deploy to Vercel

# Vercel handles deployment automatically via GitHub integration.
# This workflow exists as a record/status check only.
# When a push to main passes CI, Vercel auto-deploys via webhook.

on:
  push:
    branches: [main]

jobs:
  verify-before-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Deployment triggered
        run: echo "✅ All checks passed. Vercel deployment triggered via GitHub integration."
